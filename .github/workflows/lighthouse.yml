name: Lighthouse CI

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Run Lighthouse CI
        id: lhci
        continue-on-error: true
        run: npx lhci autorun

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/

      - name: Post PR comment with Lighthouse scores
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const lhciDir = '.lighthouseci';
            let files = [];
            try {
              files = fs.readdirSync(lhciDir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            } catch (e) {
              console.log('No .lighthouseci directory found');
              return;
            }

            if (files.length === 0) {
              console.log('No LHR JSON files found');
              return;
            }

            function scoreEmoji(score) {
              if (score >= 0.9) return '✅';
              if (score >= 0.5) return '⚠️';
              return '❌';
            }

            function fmtScore(score) {
              return Math.round(score * 100);
            }

            // Group reports by URL
            const reportsByUrl = {};
            for (const file of files) {
              const lhr = JSON.parse(fs.readFileSync(path.join(lhciDir, file), 'utf8'));
              const url = new URL(lhr.finalUrl);
              const urlPath = url.pathname || '/';
              if (!reportsByUrl[urlPath]) {
                reportsByUrl[urlPath] = lhr;
              }
            }

            const lhciOutcome = '${{ steps.lhci.outcome }}';
            const passed = lhciOutcome === 'success';
            const statusLine = passed
              ? '✅ All Lighthouse assertions passed.'
              : '❌ One or more Lighthouse assertions failed.';

            let table = '| URL | Performance | Accessibility | Best Practices |\n';
            table += '|-----|-------------|---------------|----------------|\n';

            for (const [urlPath, lhr] of Object.entries(reportsByUrl)) {
              const perf = lhr.categories['performance'].score ?? 0;
              const a11y = lhr.categories['accessibility'].score ?? 0;
              const bp = lhr.categories['best-practices'].score ?? 0;
              table += `| \`${urlPath}\` | ${scoreEmoji(perf)} ${fmtScore(perf)} | ${scoreEmoji(a11y)} ${fmtScore(a11y)} | ${scoreEmoji(bp)} ${fmtScore(bp)} |\n`;
            }

            const body = `## Lighthouse CI Results\n\n${statusLine}\n\n${table}\n> Scores are out of 100. ✅ ≥ 90 | ⚠️ 50–89 | ❌ < 50`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('## Lighthouse CI Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if Lighthouse CI failed
        if: steps.lhci.outcome == 'failure'
        run: exit 1

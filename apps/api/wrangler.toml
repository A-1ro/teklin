name = "teklin"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ─── Build (runs before deploy, builds frontend SPA) ───
[build]
command = "cd ../.. && npm ci && npm run build:web"

# ─── Static Assets (SPA frontend) ───
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "none"

# ─── D1 Database ───
[[d1_databases]]
binding = "DB"
database_name = "teklin-db"
database_id = "9cbca9c6-5b2f-4107-accf-6a991677314d"
migrations_dir = "migrations"

# ─── KV Namespaces ───
[[kv_namespaces]]
binding = "SESSION_KV"
id = "39da33960bcb4abd9ccf754089013227"

[[kv_namespaces]]
binding = "SRS_KV"
id = "038a412f9d384cd8b9f4eec6cb27f125"

[[kv_namespaces]]
binding = "STREAK_KV"
id = "4b3f594daba749a9863543f8653ceb39"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "50d730b4541a47cf9c39ae3f552338f6"

# ─── R2 Buckets ───
[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "teklin-content"

# ─── Workers AI ───
[ai]
binding = "AI"

# ─── Environment Variables ───
[vars]
ENVIRONMENT = "production"
APP_URL = "https://teklin.app"
LLM_DAILY_TOKEN_LIMIT = "100000"
WORKERS_AI_LIGHTWEIGHT_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
WORKERS_AI_QUALITY_MODEL = "anthropic/claude-sonnet-4.6"

[observability]
[observability.logs]
enabled = false
invocation_logs = true

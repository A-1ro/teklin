name = "teklin-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ───
[[d1_databases]]
binding = "DB"
database_name = "teklin-db"
database_id = "placeholder-replace-with-actual-id"
migrations_dir = "migrations"

# ─── KV Namespaces ───
[[kv_namespaces]]
binding = "SESSION_KV"
id = "placeholder-replace-with-actual-id"

[[kv_namespaces]]
binding = "SRS_KV"
id = "placeholder-replace-with-actual-id"

[[kv_namespaces]]
binding = "STREAK_KV"
id = "placeholder-replace-with-actual-id"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "placeholder-replace-with-actual-id"

# ─── R2 Buckets ───
[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "teklin-content"

# ─── AI Gateway (via AI binding) ───
[ai]
binding = "AI"

# ─── Environment Variables ───
[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:3000"
AI_GATEWAY_ACCOUNT_ID = "placeholder-replace-with-actual-account-id"
AI_GATEWAY_ID = "placeholder-replace-with-actual-gateway-id"
LLM_DAILY_TOKEN_LIMIT = "100000"

# ─── Secrets (set via `wrangler secret put`) ───
# wrangler secret put OPENAI_API_KEY
# wrangler secret put ANTHROPIC_API_KEY
